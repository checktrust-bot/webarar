<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WebAR Mobile Marker</title>

  <!-- A-Frame Library -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js Library -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <style>
    body { margin:0; overflow:hidden; }
    a-scene { width:100vw; height:100vh; }
  </style>
</head>
<body>

<a-scene embedded
         vr-mode-ui="enabled: false"
         arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: true;">

  <!-- Marker: use Hiro preset for testing -->
  <!-- Replace 'preset="hiro"' with your custom marker type/patt file when ready -->
  <a-marker preset="hiro">
    
    <!-- Test Cube to check marker detection -->
    <a-box position="0 0.5 0" color="red" scale="1 1 1"></a-box>

    <!-- Your 3D Model -->
    <a-entity gltf-model="ar.glb"
              scale="2 2 2"
              position="0 0 0"
              rotation="0 180 0">
    </a-entity>

  </a-marker>

  <!-- Camera -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
