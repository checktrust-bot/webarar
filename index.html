<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Test</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
overflow:hidden;
}
</style>

</head>

<body>

<a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: true;">

<a-marker type="pattern" url="pattern-tracker.patt">

<!-- TEST CUBE -->
<a-box
position="0 0.5 0"
material="color:red"
scale="1 1 1">
</a-box>

<!-- YOUR 3D MODEL -->
<a-entity
gltf-model="ar.glb"
scale="2 2 2"
position="0 0 0"
rotation="0 180 0">
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
